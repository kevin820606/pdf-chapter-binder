[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "pdf-outline"
version = "0.1.0"
description = "Merge chapter PDFs in CLI order with auto-generated outline titles."
readme = "README.md"
requires-python = ">=3.14"
license = "MIT"
dependencies = [
    "pikepdf>=10.5.1",
    "typer>=0.24.1",
    "pydantic>=2.10.6",
]

[project.scripts]
pdf-outline = "pdf_outline.cli:main"

[dependency-groups]
dev = [
    "pytest>=9.0.2",
]
